<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Faturamento e Repasse</title>
<style>
:root{--bg:#07101f;--panel:#111b2e;--panel2:#0b1528;--line:#273754;--text:#eef5ff;--muted:#91a4c2;--blue:#60a5fa;--cyan:#22d3ee;--green:#5eead4;--yellow:#fbbf24;--red:#fb7185}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 0 0,#14213d,#08111f 48%,#040812);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text)}header{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}h1{margin:0;font-size:23px}.sub{color:var(--muted);font-size:14px;margin-top:5px}.nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.nav button,.top button,.tabs button{background:#0f1d35;color:#cfe8ff;border:1px solid var(--line);border-radius:999px;padding:9px 12px;cursor:pointer}.nav button.active,.tabs button.active,.top button.primary{background:linear-gradient(90deg,#2563eb,#0891b2);border:0;color:white}.top{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start}select,input{background:#0f172a;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px 12px}.wrap{padding:18px 22px}.tabs,.crumbs,.rates{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.crumb{background:#0f1d35;border:1px solid var(--line);color:#bfdbfe;border-radius:999px;padding:8px 10px;cursor:pointer}.rates{display:none}.rate{background:rgba(17,27,46,.94);border:1px solid var(--line);border-radius:14px;padding:10px}.rate label{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}.rate input{width:94px;padding:8px}.rate b{display:block;color:#a7f3d0;margin-top:7px}.cards{display:grid;grid-template-columns:repeat(5,minmax(130px,1fr));gap:12px;margin-bottom:16px}.card,.panel,.tile{background:rgba(17,27,46,.94);border:1px solid var(--line);border-radius:18px}.card{padding:14px}.label{color:var(--muted);font-size:12px}.val{font-size:22px;font-weight:850;margin-top:6px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.tile{padding:15px;text-align:left;cursor:pointer;transition:.14s}.tile:hover{transform:translateY(-2px);border-color:var(--blue)}.tile h3{margin:0 0 9px;font-size:17px}.mini{display:grid;grid-template-columns:1fr 1fr;gap:8px;color:var(--muted);font-size:12px}.mini b{display:block;color:var(--text);font-size:14px;margin-top:2px}.panel{padding:15px;overflow:hidden}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}.search{flex:1;min-width:220px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid var(--line);padding:9px 8px;text-align:left;vertical-align:top}th{color:var(--muted);font-weight:750}td.num{text-align:right;font-variant-numeric:tabular-nums}.scroll{overflow:auto}.detail{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.detail div{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px}.detail b{display:block;margin-top:5px}.logic{margin:14px 0;background:#09172b;border:1px solid #31527a;border-radius:16px;overflow:hidden}.logic summary{cursor:pointer;padding:14px 16px;font-weight:850;color:#bfdbfe}.logicbody{padding:0 16px 16px;color:#dbeafe;line-height:1.45}.formula{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}.formula div{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px}code{background:#020617;border:1px solid #1f2f4a;border-radius:8px;padding:2px 6px;color:#a7f3d0}.warn{color:var(--yellow)}.bad{color:var(--red)}.small{font-size:12px;color:var(--muted)}@media(max-width:900px){header,.wrap{padding:15px}.cards{grid-template-columns:1fr 1fr}.val{font-size:19px}table{font-size:12px}.hide-sm{display:none}}
</style>
</head>
<body>
<header>
  <div><h1>Faturamento e Repasse</h1><div class="sub">Dashboard novo: empresa → canal → venda → detalhe, com abas de faturamento e repasse.</div><div class="nav"><button id="goHome">Início</button><button id="goMissing">SKUs sem custo</button></div></div>
  <div class="top"><select id="monthSelect"></select><button class="primary" id="reloadBtn">Recarregar dados</button></div>
</header>
<main class="wrap">
  <div class="tabs"><button id="tabFaturamento" class="active">Aba Faturamento</button><button id="tabRepasse">Aba Repasse</button></div>
  <div id="rates" class="rates"><div class="rate"><label>Imposto %</label><input id="rImp" type="number" step="0.01"></div><div class="rate"><label>Custo operacional %</label><input id="rOp" type="number" step="0.01"></div><div class="rate"><label>Margem %</label><input id="rMarg" type="number" step="0.01"></div><div class="rate"><label>Percentual líquido</label><b id="rNet">37%</b></div><div class="rate"><label>Variante</label><button id="resetRates">Reset padrão</button></div></div>
  <div id="crumbs" class="crumbs"></div>
  <div class="cards"><div class="card"><div class="label">Faturamento</div><div id="cardFat" class="val">R$ 0,00</div></div><div class="card"><div class="label">Repasse</div><div id="cardRep" class="val">R$ 0,00</div></div><div class="card"><div class="label">Pedidos</div><div id="cardPed" class="val">0</div></div><div class="card"><div class="label">Itens</div><div id="cardItens" class="val">0</div></div><div class="card"><div class="label">SKUs sem custo</div><div id="cardSem" class="val warn">0</div></div></div>
  <section id="content" class="panel">Carregando dados...</section>
</main>
<script>
const $ = id => document.getElementById(id);
const BRL = v => (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const NUM = v => (Number(v)||0).toLocaleString('pt-BR');
const RATE_KEY = 'dashboard_repasse_rates_v2';
let data = [];
let state = { view:'empresas', metric:'faturamento', month:'Todos', empresa:null, canal:null, pedido:null };
const months = ['Todos','Janeiro','Fevereiro','Março','Abril','Maio'];
$('monthSelect').innerHTML = months.map(m=>`<option value="${m}">${m}</option>`).join('');
function loadRates(){ return JSON.parse(localStorage.getItem(RATE_KEY)||'null') || {imp:14, op:44, marg:5}; }
function saveRates(){ localStorage.setItem(RATE_KEY, JSON.stringify({imp:+$('rImp').value||0, op:+$('rOp').value||0, marg:+$('rMarg').value||0})); }
function applyRates(){ const r=loadRates(); $('rImp').value=r.imp; $('rOp').value=r.op; $('rMarg').value=r.marg; }
function rates(){ return {imp:(+$('rImp').value||0)/100, op:(+$('rOp').value||0)/100, marg:(+$('rMarg').value||0)/100}; }
function net(){ const r=rates(); return 1-r.imp-r.op-r.marg; }
function repUnit(r){ const n=net(); return r.custo_unitario && n>0 ? r.custo_unitario/n : 0; }
function repTotal(r){ return repUnit(r)*(r.quantidade||0); }
function filteredBase(){ return data.filter(r => state.month==='Todos' || r.mes===state.month); }
function scoped(){ return filteredBase().filter(r => (!state.empresa || r.empresa===state.empresa) && (!state.canal || r.canal===state.canal) && (!state.pedido || r.pedido_marketplace===state.pedido)); }
function summarize(rows){ const pedidos = new Set(rows.map(r=>r.pedido_marketplace)); const skusSem = new Set(rows.filter(r=>r.sem_custo).map(r=>r.sku)); return { fat: rows.reduce((a,r)=>a+(r.valor_venda||0),0), rep: rows.reduce((a,r)=>a+repTotal(r),0), ped: pedidos.size, itens: rows.reduce((a,r)=>a+(r.quantidade||0),0), sem: skusSem.size }; }
function metricValue(s){ return state.metric==='faturamento' ? s.fat : s.rep; }
function group(rows, key){ const m=new Map(); rows.forEach(r=>{ const k=r[key]||'—'; if(!m.has(k))m.set(k,[]); m.get(k).push(r); }); return [...m.entries()].map(([name,rows])=>({name,rows,...summarize(rows)})).sort((a,b)=>metricValue(b)-metricValue(a)); }
function setMetric(metric){ state.metric=metric; $('tabFaturamento').classList.toggle('active', metric==='faturamento'); $('tabRepasse').classList.toggle('active', metric==='repasse'); $('rates').style.display = metric==='repasse' ? 'flex' : 'none'; render(); }
function goHome(){ state.view='empresas'; state.empresa=null; state.canal=null; state.pedido=null; render(); }
function setCrumbs(){ const c=[]; const add=(txt,fn)=>{ const b=document.createElement('span'); b.className='crumb'; b.textContent=txt; b.addEventListener('click',fn); c.push(b); }; add('Empresas', goHome); if(state.empresa) add(state.empresa,()=>{state.view='canais';state.canal=null;state.pedido=null;render();}); if(state.canal) add(state.canal,()=>{state.view='vendas';state.pedido=null;render();}); if(state.pedido) add('Venda '+state.pedido,()=>{}); $('crumbs').replaceChildren(...c); }
function updateCards(rows){ const n=net(); $('rNet').textContent=(n*100).toLocaleString('pt-BR',{maximumFractionDigits:2})+'%'; $('rNet').className=n<=0?'bad':''; const s=summarize(rows); $('cardFat').textContent=BRL(s.fat); $('cardRep').textContent=BRL(s.rep); $('cardPed').textContent=NUM(s.ped); $('cardItens').textContent=NUM(s.itens); $('cardSem').textContent=NUM(s.sem); }
function tile(obj, onClick){ const el=document.createElement('button'); el.className='tile'; el.innerHTML=`<h3>${obj.name}</h3><div class="mini"><span>Faturamento<b>${BRL(obj.fat)}</b></span><span>Repasse<b>${BRL(obj.rep)}</b></span><span>Pedidos<b>${NUM(obj.ped)}</b></span><span>Itens<b>${NUM(obj.itens)}</b></span>${obj.sem?`<span>Sem custo<b class="warn">${NUM(obj.sem)}</b></span>`:''}</div>`; el.addEventListener('click', onClick); return el; }
function renderTiles(key, nextView, setter){ const grid=document.createElement('div'); grid.className='grid'; const groups=group(scoped(), key); groups.forEach(g=>grid.appendChild(tile(g,()=>{ setter(g.name); state.view=nextView; render(); }))); if(!groups.length) grid.innerHTML='<div class="panel">Sem dados.</div>'; $('content').className=''; $('content').replaceChildren(grid); }
function renderEmpresas(){ renderTiles('empresa','canais', v=>{state.empresa=v; state.canal=null; state.pedido=null;}); }
function renderCanais(){ renderTiles('canal','vendas', v=>{state.canal=v; state.pedido=null;}); }
function renderVendas(){ const panel=document.createElement('div'); panel.className='panel'; panel.innerHTML=`<div class="toolbar"><input class="search" id="searchVenda" placeholder="Buscar venda, SKU ou descrição..."></div><div class="scroll"><table><thead><tr><th>Venda</th><th>Data</th><th>SKUs</th><th class="num">Faturamento</th><th class="num">Repasse</th><th class="num">Itens</th><th></th></tr></thead><tbody id="salesBody"></tbody></table></div>`; $('content').className=''; $('content').replaceChildren(panel); const groups=group(scoped(),'pedido_marketplace'); const draw=()=>{ const q=($('searchVenda').value||'').toLowerCase(); const list=groups.filter(g=>!q || g.name.toLowerCase().includes(q) || g.rows.some(r=>(r.sku+' '+(r.descricao||'')).toLowerCase().includes(q))); $('salesBody').innerHTML = list.map(g=>`<tr><td>${g.name}</td><td>${g.rows[0]?.data||''}</td><td>${[...new Set(g.rows.map(r=>r.sku))].slice(0,4).join(', ')}</td><td class="num">${BRL(g.fat)}</td><td class="num">${BRL(g.rep)}</td><td class="num">${NUM(g.itens)}</td><td><button data-sale="${encodeURIComponent(g.name)}">Detalhar</button></td></tr>`).join('') || '<tr><td colspan="7">Sem dados.</td></tr>'; $('salesBody').querySelectorAll('button[data-sale]').forEach(btn=>btn.addEventListener('click',()=>{state.pedido=decodeURIComponent(btn.dataset.sale); state.view='detalhe'; render();})); }; $('searchVenda').addEventListener('input', draw); draw(); }
function renderDetalhe(){ const rows=scoped(); const s=summarize(rows); const panel=document.createElement('div'); panel.className='panel'; panel.innerHTML=`<h2>Venda ${state.pedido}</h2><div class="detail"><div>Empresa<b>${state.empresa||''}</b></div><div>Canal<b>${state.canal||''}</b></div><div>Data<b>${rows[0]?.data||''}</b></div><div>Status<b>${rows[0]?.status||''}</b></div><div>Faturamento<b>${BRL(s.fat)}</b></div><div>Repasse<b>${BRL(s.rep)}</b></div></div><details class="logic"><summary>Ver lógica da precificação de repasse</summary><div class="logicbody"><p><b>Objetivo:</b> calcular o valor de repasse ao sócio sem alterar o custo de fabricação do SKU.</p><div class="formula"><div><b>1. Custo unitário</b><br>Vem da planilha de custos por SKU.</div><div><b>2. Percentuais usados</b><br>Imposto: <code>${$('rImp').value}%</code><br>Custo operacional: <code>${$('rOp').value}%</code><br>Margem: <code>${$('rMarg').value}%</code></div><div><b>3. Percentual líquido</b><br><code>1 - (Imposto + Operacional + Margem)</code><br><code>${(net()*100).toLocaleString('pt-BR',{maximumFractionDigits:2})}%</code></div><div><b>4. Valor de venda UNIT</b><br><code>Custo unitário / Percentual líquido</code></div><div><b>5. Valor total</b><br><code>Valor de venda UNIT × Quantidade</code></div></div></div></details><h2 style="margin-top:18px">Itens da venda</h2><div class="scroll"><table><thead><tr><th>SKU</th><th>Descrição</th><th class="num">Qtd</th><th class="num">Venda unit.</th><th class="num">Valor venda</th><th class="num">Custo unit.</th><th class="num">Repasse unit.</th><th class="num">Repasse total</th><th>Custo</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.sku}</td><td>${r.descricao||''}</td><td class="num">${NUM(r.quantidade)}</td><td class="num">${BRL(r.valor_unitario_real)}</td><td class="num">${BRL(r.valor_venda)}</td><td class="num">${BRL(r.custo_unitario)}</td><td class="num">${BRL(repUnit(r))}</td><td class="num">${BRL(repTotal(r))}</td><td>${r.sem_custo?'<span class="bad">sem custo</span>':`ok (${r.aba_custo||''})`}</td></tr>`).join('')}</tbody></table></div>`; $('content').className=''; $('content').replaceChildren(panel); }
function render(){ setCrumbs(); const rows=scoped(); updateCards(rows.length?rows:filteredBase()); if(state.view==='empresas')renderEmpresas(); else if(state.view==='canais')renderCanais(); else if(state.view==='vendas')renderVendas(); else renderDetalhe(); }
async function loadData(){ $('content').textContent='Carregando dados...'; const res=await fetch('drilldown-data.json',{cache:'no-store'}); data=await res.json(); render(); }
$('goHome').addEventListener('click',goHome); $('goMissing').addEventListener('click',()=>location.href='skus-sem-custo.html'); $('reloadBtn').addEventListener('click',loadData); $('tabFaturamento').addEventListener('click',()=>setMetric('faturamento')); $('tabRepasse').addEventListener('click',()=>setMetric('repasse')); $('monthSelect').addEventListener('change',()=>{state.month=$('monthSelect').value; goHome();}); ['rImp','rOp','rMarg'].forEach(id=>$(id).addEventListener('change',()=>{saveRates(); render();})); $('resetRates').addEventListener('click',()=>{localStorage.removeItem(RATE_KEY); applyRates(); render();});
applyRates(); setMetric('faturamento'); loadData().catch(err=>{console.error(err); $('content').innerHTML='<div class="panel bad">Erro ao carregar dados. Recarregue a página.</div>';});
</script>
</body>
</html>
